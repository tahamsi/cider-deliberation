seed: 123
output_dir: outputs/smoke
agent:
  type: mock
  model_name: deterministic-mock
  temperature: 0.0
datasets:
  inline:
    - dataset: smoke_mc
      id: mc_1
      question: "What is 2 + 2?"
      choices: ["3", "4", "5", "6"]
      answer: "B"
      answer_index: 1
      metadata: {}
    - dataset: smoke_bool
      id: bool_1
      question: "The sky is blue on a clear day."
      choices: ["False", "True"]
      answer: "B"
      answer_index: 1
      metadata: {}
methods:
  - single_agent
  - self_consistency
  - majority_vote
  - standard_multi_agent_debate
  - consensagent_style
  - free_mad_style
  - agentauditor_style
  - c3_style_causal_credit_analysis
  - conformal_social_choice
  - dar_style_diversity_aware_retention
  - adaptive_stability_detection
  - cider_full
method_params:
  num_agents: 3
  num_samples: 5
  rounds: 2
